syntax = "proto3";

package bookservice;

option go_package = "./proto";

message Book {
    int32 id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    float price = 5;
    int32 stock = 6;
    int32 published_year = 7;
}

// TODO: Define GetBookRequest (id)
message GetBookRequest {
    int32 id = 1;
}

// TODO: Define GetBookResponse (book)
message GetBookResponse {
    Book book = 1;
}

// TODO: Define CreateBookRequest (all fields except id)
message CreateBookRequest {
    string title = 1;
    string author = 2;
    string isbn = 3;
    float price = 4;
    int32 stock = 5;
    int32 published_year = 6;
}

// TODO: Define CreateBookResponse (book)
message CreateBookResponse {
    Book book = 1;
}

// TODO: Define UpdateBookRequest (all fields including id)
message UpdateBookRequest {
    int32 id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    float price = 5;
    int32 stock = 6;
    int32 published_year = 7;    
}

// TODO: Define UpdateBookResponse (book)
message UpdateBookResponse {
    Book book = 1;
}


// TODO: Define DeleteBookRequest (id)
message DeleteBookRequest {
    int32 id = 1;
}

// TODO: Define DeleteBookResponse (success, message)
message DeleteBookResponse {
    bool success = 1;
    string message = 2;
}

// TODO: Define ListBooksRequest (page, page_size)
message ListBooksRequest {
    int32 page = 1;
    int32 page_size = 2;
}


// TODO: Define ListBooksResponse (books, total, page, page_size)
message ListBooksResponse {
    repeated Book books = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

// Task 4: Advanced Search and Error Handling
message SearchBooksRequest {
  string query = 1;
  string field = 2;  // "title", "author", "isbn", or "all"
}

message SearchBooksResponse {
  repeated Book books = 1;
  int32 count = 2;
  string query = 3;
}

message FilterBooksRequest {
  float min_price = 1;
  float max_price = 2;
  int32 min_year = 3;
  int32 max_year = 4;
}

message FilterBooksResponse {
  repeated Book books = 1;
  int32 count = 2;
}

message GetStatsRequest {
  // Empty
}

message GetStatsResponse {
  int32 total_books = 1;
  float average_price = 2;
  int32 total_stock = 3;
  int32 earliest_year = 4;
  int32 latest_year = 5;
}

service BookCatalog {
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc UpdateBook(UpdateBookRequest) returns (UpdateBookResponse);
  rpc DeleteBook(DeleteBookRequest) returns (DeleteBookResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc SearchBooks(SearchBooksRequest) returns (SearchBooksResponse);
  rpc FilterBooks(FilterBooksRequest) returns (FilterBooksResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}
